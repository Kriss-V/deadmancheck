<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DeadManCheck — Cron Job Monitoring{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Know the moment your scheduled jobs fail or run too long. Open source cron job monitoring with duration anomaly detection.{% endblock %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0fdf4', 500:'#22c55e', 600:'#16a34a', 700:'#15803d' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased">
  {% block nav %}
  <nav class="border-b border-gray-800 px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <a href="/" class="text-brand-500 font-bold text-xl tracking-tight">DeadManCheck</a>
      <div class="flex items-center gap-6 text-sm text-gray-400">
        <a href="/pricing" class="hover:text-white transition-colors">Pricing</a>
        <a href="/docs/quickstart" class="hover:text-white transition-colors">Docs</a>
        <a href="https://github.com/Kriss-V/deadmancheck" class="hover:text-white transition-colors">GitHub</a>
        <a href="/login" class="hover:text-white transition-colors">Log in</a>
        <a href="/register" class="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg transition-colors font-medium">Get started free</a>
      </div>
    </div>
  </nav>
  {% endblock %}

  {% block content %}{% endblock %}

  {% block footer %}
  <footer class="border-t border-gray-800 mt-24 px-6 py-12 text-center text-gray-500 text-sm">
    <p>DeadManCheck.io — Open source cron job monitoring</p>
    <p class="mt-2">
      <a href="https://github.com/Kriss-V/deadmancheck" class="hover:text-gray-300">GitHub</a> ·
      <a href="/pricing" class="hover:text-gray-300 ml-4">Pricing</a> ·
      <a href="mailto:deadmancheck@gmail.com" class="hover:text-gray-300 ml-4">Support</a>
    </p>
  </footer>
  {% endblock %}
</body>
</html>
