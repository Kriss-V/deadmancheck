{% extends "base.html" %}
{% block title %}Forgot password — DeadManCheck{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-6">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="/" class="text-brand-500 font-bold text-2xl">DeadManCheck</a>
      <h1 class="text-xl font-semibold mt-6 mb-1">Forgot your password?</h1>
      <p class="text-gray-400 text-sm">Enter your email and we'll send a reset link.</p>
    </div>

    {% if success %}
    <div class="bg-green-900/30 border border-green-700 text-green-300 rounded-lg px-4 py-3 text-sm mb-4">{{ success }}</div>
    {% endif %}

    {% if not success %}
    <form method="post" action="/forgot-password" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-300 mb-1.5">Email</label>
        <input type="email" name="email" required autocomplete="email"
          class="w-full bg-gray-900 border border-gray-700 focus:border-brand-500 rounded-lg px-4 py-2.5 text-white text-sm outline-none transition-colors">
      </div>
      <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white py-2.5 rounded-lg font-medium transition-colors">
        Send reset link
      </button>
    </form>
    {% endif %}

    <p class="text-center text-gray-500 text-sm mt-6">
      <a href="/login" class="text-brand-500 hover:underline">Back to log in</a>
    </p>
  </div>
</div>
{% endblock %}
