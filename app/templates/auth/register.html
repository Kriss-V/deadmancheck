{% extends "base.html" %}
{% block title %}Create account — DeadManCheck{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-6">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="/" class="text-brand-500 font-bold text-2xl">DeadManCheck</a>
      <h1 class="text-xl font-semibold mt-6 mb-1">Create your free account</h1>
      <p class="text-gray-400 text-sm">5 monitors free. No credit card.</p>
    </div>

    {% if error %}
    <div class="bg-red-900/30 border border-red-700 text-red-300 rounded-lg px-4 py-3 text-sm mb-4">{{ error }}</div>
    {% endif %}

    <form id="registerForm" class="space-y-4" method="post" action="/register" enctype="application/x-www-form-urlencoded">
      <div>
        <label class="block text-sm text-gray-300 mb-1.5">Email</label>
        <input type="email" name="email" required autocomplete="email"
          class="w-full bg-gray-900 border border-gray-700 focus:border-brand-500 rounded-lg px-4 py-2.5 text-white text-sm outline-none transition-colors">
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-1.5">Password</label>
        <input type="password" name="password" required minlength="8" autocomplete="new-password"
          class="w-full bg-gray-900 border border-gray-700 focus:border-brand-500 rounded-lg px-4 py-2.5 text-white text-sm outline-none transition-colors">
      </div>
      <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white py-2.5 rounded-lg font-medium transition-colors">
        Create account
      </button>
    </form>

    <p class="text-center text-gray-500 text-sm mt-6">
      Already have an account? <a href="/login" class="text-brand-500 hover:underline">Log in</a>
    </p>
  </div>
</div>

{% endblock %}
